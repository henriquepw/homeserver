name: nextcloud
services:
  db:
    container_name: db
    image: mariadb:lts
    command: --transaction-isolation=READ-COMMITTED
    restart: always
    volumes:
      - db:/var/lib/mysql:Z
    environment:
      - MARIADB_AUTO_UPGRADE=1
      - MARIADB_DISABLE_UPGRADE_BACKUP=1
    labels:
      glance.hide: false
      glance.parent: nextcloud
      glance.name: DB

  redis:
    container_name: redis
    image: redis:alpine
    restart: always
    labels:
      glance.hide: false
      glance.parent: nextcloud
      glance.name: redis

  app:
    container_name: app
    image: nextcloud:fpm-alpine
    restart: always
    volumes:
      - nextcloud:/var/www/html:z
    environment:
      - MYSQL_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    labels:
      glance.hide: false
      glance.id: nextcloud
      glance.name: Nextcloud
      glance.icon: si:nextcloud
      glance.url: http://mini:9980
      glance.description: Personal cloud

  web:
    container_name: web
    image: nginx:alpine-slim
    restart: always
    ports:
      - 9980:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nextcloud:/var/www/html:z,ro
    depends_on:
      - app
    labels:
      glance.hide: false
      glance.parent: nextcloud
      glance.name: nginx

  cron:
    container_name: cron
    image: nextcloud:fpm-alpine
    restart: always
    volumes:
      - nextcloud:/var/www/html:z
    entrypoint: /cron.sh
    depends_on:
      - db
      - redis
    labels:
      glance.hide: false
      glance.parent: nextcloud
      glance.name: cron

volumes:
  db:
  nextcloud:
