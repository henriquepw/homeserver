- name: Home
  hide-desktop-navigation: true
  columns:
    - size: small
      widgets:
        - type: calendar
          first-day-of-week: monday

        - type: rss
          limit: 10
          collapse-after: 3
          cache: 12h
          feeds:
            - url: https://selfh.st/rss/
              title: selfh.st

        - type: twitch-channels
          channels:
            - theprimeagen
            - bluesr
            - omeiaumm
            - felps
            - patopapao

    - size: full
      widgets:
        - type: group
          widgets:
            - type: hacker-news
            - type: lobsters

        - type: group
          widgets:
            - type: reddit
              subreddit: homelab
              show-thumbnails: true
            - type: reddit
              subreddit: SteamDeckModded
              show-thumbnails: true
            - type: reddit
              subreddit: audiofiliabrasil
              show-thumbnails: true
            - type: reddit
              subreddit: MechanicalKeyboards
              show-thumbnails: true

    - size: small
      widgets:
        - type: weather
          location: ${LOCATION}
          units: metric
          hour-format: 24h
          hide-location: true

        - type: releases
          cache: 1d
          # Without authentication the Github API allows for up to 60 requests per hour. You can create a
          # read-only token from your Github account settings and use it here to increase the limit.
          # token: ...
          repositories:
            - glanceapp/glance
            - immich-app/immich
            - gotson/komga
            - syncthing/syncthing

        - type: docker-containers
          title: Apps
          hide-by-default: true
