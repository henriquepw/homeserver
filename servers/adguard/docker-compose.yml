services:
  adguard:
    image: adguard/adguardhome
    container_name: adguard
    restart: unless-stopped

    volumes:
      - ${APP_DIR}/adguard/data:/opt/adguardhome/work
      - ${APP_DIR}/adguard/config:/opt/adguardhome/conf

    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
