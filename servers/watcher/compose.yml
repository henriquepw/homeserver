name: "watcher"

networks:
  arr_net:
    driver: bridge

services:
  qbittorrent:
    container_name: qbittorrent
    image: linuxserver/qbittorrent:latest
    restart: unless-stopped
    networks:
      - arr_net
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=62609
    volumes:
      - ${APPS_DIR}/qbittorrent/config:/config
      - ${MEDIA_DIR}:/data
    ports:
      - "9950:8080"
      - "62609:62609"
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      retries: 3
      start_period: 20s
      timeout: 10s

  prowlarr:
    container_name: prowlarr
    image: ghcr.io/hotio/prowlarr:latest
    restart: unless-stopped
    networks:
      - arr_net
    depends_on:
      - flaresolverr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPS_DIR}/prowlarr/config:/config
    ports:
      - "9951:9696"

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    networks:
      - arr_net
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=${TZ}
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    ports:
      - "9952:8191"

  radarr:
    container_name: radarr
    image: ghcr.io/linuxserver/radarr:latest
    restart: unless-stopped
    networks:
      - arr_net
    depends_on:
      - qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPS_DIR}/radarr/config:/config
      - ${MEDIA_DIR}:/data
    ports:
      - "9953:7878"

  sonarr:
    container_name: sonarr
    image: ghcr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    networks:
      - arr_net
    depends_on:
      - qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPS_DIR}/sonarr/config:/config
      - ${MEDIA_DIR}:/data
    ports:
      - "9954:8989"

  lidarr:
    container_name: lidarr
    image: lscr.io/linuxserver/lidarr:latest
    restart: unless-stopped
    networks:
      - arr_net
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPS_DIR}/lidarr:/config
      - ${MEDIA_DIR}:/data
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - 9955:8686

  bazarr:
    container_name: bazarr
    image: ghcr.io/linuxserver/bazarr:latest
    restart: unless-stopped
    networks:
      - arr_net
    depends_on:
      - radarr
      - sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPS_DIR}/bazarr/config:/config
      - ${MEDIA_DIR}:/data
    ports:
      - "9956:6767"

  seerr:
    container_name: seerr
    image: ghcr.io/seerr-team/seerr:latest
    networks:
      - arr_net
    environment:
      - LOG_LEVEL=debug
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    volumes:
      - ${APPS_DIR}/seerr:/app/config
    ports:
      - 9957:5055

  jackett:
    container_name: jackett
    image: ghcr.io/linuxserver/jackett:latest
    restart: unless-stopped
    networks:
      - arr_net
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${APPS_DIR}/jackett/config:/config
    ports:
      - "9958:9117"

  nzbget:
    image: lscr.io/linuxserver/nzbget:latest
    container_name: nzbget
    restart: unless-stopped
    networks:
      - arr_net
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPS_DIR}/nzbget:/config
      - ${MEDIA_DIR}:/data
    ports:
      - "9959:6789"

  tdarr:
    container_name: tdarr
    image: ghcr.io/haveagitgat/tdarr:latest
    restart: unless-stopped
    networks:
      - arr_net
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=false
      - inContainer=true
      - nodeName=tdarr-internal
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${APPS_DIR}/tdarr/server:/app/server
      - ${APPS_DIR}/tdarr/configs:/app/configs
      - ${APPS_DIR}/tdarr/logs:/app/logs
      # Mesmo path do host para casar com o node nativo do macOS (Tdarr nao traduz paths entre nodes)
      - ${MEDIA_DIR}:${MEDIA_DIR}
      - ${APPS_DIR}/tdarr/transcode_cache:/temp
    ports:
      - "9960:8265"
      - "9961:8266"
    labels:
      glance.hide: false
      glance.id: tdarr
      glance.name: Tdarr
      glance.icon: si:tdarr
      glance.url: https://tdarr.henrique.pw
      glance.description: Media transcoding

  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    restart: unless-stopped
    networks:
      - arr_net
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - ND_SCANSCHEDULE=1h
      - ND_LOGLEVEL=info
    volumes:
      - ${APPS_DIR}/navidrome:/data
      - ${MEDIA_DIR}/musics:/music:ro
    ports:
      - "9962:4533"
    labels:
      glance.hide: false
      glance.id: navidrome
      glance.name: Navidrome
      glance.icon: si:navidrome
      glance.url: https://music.henrique.pw
      glance.description: Music streaming

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    ports:
      - 9920:8096/tcp
      - 7360:7359/udp
    volumes:
      - ${APPS_DIR}/jellyfin/config:/config
      - ${APPS_DIR}/jellyfin/cache:/cache
      - type: bind
        source: ${MEDIA_DIR}/videos
        target: /media/videos
      - type: bind
        source: ${MEDIA_DIR}/fonts
        target: /usr/local/share/fonts/custom
        read_only: true
    restart: "unless-stopped"
    environment:
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - arr_net
    labels:
      glance.hide: false
      glance.id: jellyfin
      glance.name: Jellyfin
      glance.icon: si:jellyfin
      glance.url: https://tv.henrique.pw
      glance.description: Movies & shows
