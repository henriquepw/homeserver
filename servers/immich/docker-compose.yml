name: immich
services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION}
    volumes:
      - ${IMMICH_UPLOAD_LOCATION}:/usr/src/app/upload
      - ${IMMICH_PHOTOS}:/user/src/app/photos:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "9905:2283"
    depends_on:
      - redis
      - database
    restart: always
    healthcheck:
      disable: false
    labels:
      glance.hide: false
      glance.id: immich
      glance.name: Immich
      glance.icon: si:immich
      glance.url: http://mini:9905
      glance.description: Image & video management

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION}
    volumes:
      - model-cache:/cache
    restart: always
    healthcheck:
      disable: false
    labels:
      glance.hide: false
      glance.parent: immich
      glance.name: Machine Learning

  redis:
    image: docker.io/valkey/valkey:8-bookworm@sha256:fec42f399876eb6faf9e008570597741c87ff7662a54185593e74b09ce83d177
    healthcheck:
      test: redis-cli ping || exit 1
    restart: always
    labels:
      glance.hide: false
      glance.parent: immich
      glance.name: Redis

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      POSTGRES_PASSWORD: ${IMMICH_DB_PASSWORD}
      POSTGRES_USER: ${IMMICH_DB_USERNAME}
      POSTGRES_DB: ${IMMICH_DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      # DB_STORAGE_TYPE: 'HDD' # Uncomment var if your database isn't stored on SSDs
    volumes:
      - ${IMMICH_DB_DATA_LOCATION}:/var/lib/postgresql/data
    restart: always
    labels:
      glance.hide: false
      glance.parent: immich
      glance.name: DB

volumes:
  model-cache:
